<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Link Saver</title>
</head>
<body>
  <h2>Link Saver</h2>

      navigator.serviceWorker.register('sw.js');
    }
  </script>
